<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  body { margin: 0; -webkit-font-smoothing: antialiased; }

  /* ---- the dot: blink at center, swing left, sweep right shrinking ---- */
  @keyframes dotMove {
    0%   { cx: 96; cy: 90; r: 21; animation-timing-function: ease-in-out; }
    30%  { cx: 96; cy: 90; r: 21; animation-timing-function: cubic-bezier(.6,0,.25,1); }
    44%  { cx: 60; cy: 90; r: 16; animation-timing-function: linear; }
    48%  { cx: 60; cy: 90; r: 16; animation-timing-function: cubic-bezier(.3,.1,.4,1); }
    88%  { cx: 133.5; cy: 90; r: 5.25; }
    100% { cx: 133.5; cy: 90; r: 5.25; }
  }
  @keyframes dotBlink {
    0%   { opacity: 1; }
    6%   { opacity: .12; }
    12%  { opacity: 1; }
    18%  { opacity: .12; }
    24%  { opacity: 1; }
    100% { opacity: 1; }
  }

  /* ---- bars spring up as the dot passes ---- */
  @keyframes barSpring {
    0%   { transform: scaleY(0); opacity: 0; }
    55%  { opacity: 1; }
    70%  { transform: scaleY(1.18); }
    100% { transform: scaleY(1); opacity: 1; }
  }

  /* ---- wordmark settles in ---- */
  @keyframes wordIn {
    0%   { opacity: 0; transform: translateX(-14px); }
    60%  { opacity: 1; }
    78%  { transform: translateX(2px); }
    100% { opacity: 1; transform: translateX(0); }
  }

  .smv-bar {
    transform-box: fill-box;
    transform-origin: center center;
    animation: barSpring .30s cubic-bezier(.34,1.56,.64,1) both;
  }
  .smv-dot {
    animation: dotMove 1.25s linear both, dotBlink 1.25s linear both;
  }
</style>
</helmet>

<div style="min-height:100%; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:0; background:{{ bgColor }}; font-family:'Hanken Grotesk',sans-serif; padding:40px;">

  <div key="{{ playId }}" style="display:flex; align-items:center; justify-content:center; gap:6px; user-select:none;">

    <svg width="232" height="208" viewBox="0 0 150 180" fill="none" xmlns="http://www.w3.org/2000/svg" style="overflow:visible;">
      <defs>
        <linearGradient id="smv-anim-grad" x1="40" y1="90" x2="118" y2="90" gradientUnits="userSpaceOnUse">
          <stop stop-color="#FF5640"></stop>
          <stop offset="1" stop-color="#15CDA8"></stop>
        </linearGradient>
      </defs>
      <g stroke="url(#smv-anim-grad)" stroke-width="13.5" stroke-linecap="round">
        <line class="smv-bar" style="animation-delay:0.60s"  x1="60"  y1="57" x2="60"  y2="123"></line>
        <line class="smv-bar" style="animation-delay:0.73s"  x1="78"  y1="66" x2="78"  y2="114"></line>
        <line class="smv-bar" style="animation-delay:0.84s"  x1="96"  y1="75" x2="96"  y2="105"></line>
        <line class="smv-bar" style="animation-delay:0.97s"  x1="114" y1="84" x2="114" y2="96"></line>
      </g>
      <circle class="smv-dot" cx="96" cy="90" r="21" fill="#FFC23C"></circle>
    </svg>
  </div>

  <button onClick="{{ replay }}" style="margin-top:48px; display:inline-flex; align-items:center; gap:8px; padding:10px 18px; border-radius:999px; border:1px solid {{ btnBorder }}; background:transparent; color:{{ btnColor }}; font-family:'JetBrains Mono',monospace; font-size:12px; letter-spacing:.08em; text-transform:uppercase; cursor:pointer;" style-hover="background:{{ btnHover }};">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 3-6.7"></path><polyline points="3 3 3 8 8 8"></polyline></svg>
    Replay
  </button>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;: { &quot;width&quot;: 720, &quot;height&quot;: 540 }, &quot;bg&quot;: { &quot;editor&quot;: &quot;enum&quot;, &quot;options&quot;: [&quot;cream&quot;, &quot;white&quot;, &quot;ink&quot;], &quot;default&quot;: &quot;cream&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;Theme&quot; }}">
class Component extends DCLogic {
  state = { playId: 0 };
  renderVals() {
    const bg = this.props.bg ?? 'cream';
    const themes = {
      cream: { bgColor: '#FFF6EC', wordColor: '#261733', btnBorder: '#E2DACD', btnColor: '#9A8E7C', btnHover: 'rgba(38,23,51,.05)' },
      white: { bgColor: '#FFFFFF', wordColor: '#261733', btnBorder: '#ECEAF0', btnColor: '#9A96A6', btnHover: 'rgba(38,23,51,.05)' },
      ink:   { bgColor: '#261733', wordColor: '#FFF6EC', btnBorder: 'rgba(255,246,236,.22)', btnColor: 'rgba(255,246,236,.6)', btnHover: 'rgba(255,246,236,.08)' },
    };
    const t = themes[bg] || themes.cream;
    return {
      ...t,
      playId: this.state.playId,
      replay: () => this.setState(s => ({ playId: s.playId + 1 })),
    };
  }
}
</script>
</body>
</html>
